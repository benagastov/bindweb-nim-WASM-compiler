<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>app.wasm — standalone</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
         background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 16px; margin: 0 0 2px; color: #e6edf3; }
  .sub { color: #8b949e; font-size: 12px; margin-bottom: 16px; }
  .bar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px;
           padding: 6px 12px; cursor: pointer; font: inherit; }
  button:hover { background: #30363d; }
  button.tab.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .pill { font-size: 12px; padding: 2px 8px; border-radius: 10px; background: #21262d; color: #8b949e; }
  .pill.ok { background: #196c2e; color: #fff; }
  .pill.err { background: #8b1a1a; color: #fff; }
  iframe { width: 100%; min-height: 320px; border: 1px solid #30363d; border-radius: 8px;
           background: #fff; }
  pre { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px;
        margin: 0; white-space: pre-wrap; word-break: break-word; max-height: 60vh; overflow: auto; }
  .err-box { border-color: #8b1a1a; color: #ffa198; margin-top: 12px; }
  .hidden { display: none; }
  footer { margin-top: 18px; color: #6e7681; font-size: 11px; }
</style>
</head>
<body>
  <h1>app.wasm</h1>
  <div class="sub">A Nim program compiled to WebAssembly, running standalone with a built-in WASI shim. No server, no toolchain.</div>
  <div class="bar">
    <button id="rerun">Run again</button>
    <button id="tabRendered" class="tab active">Rendered</button>
    <button id="tabRaw" class="tab">Raw stdout</button>
    <span id="status" class="pill">running…</span>
  </div>
  <!-- allow-scripts WITHOUT allow-same-origin: the program's output runs in an
       opaque origin. Scripts execute, but the frame cannot reach this runner
       page or remove its own sandbox (combining the two would let it escape). -->
  <iframe id="rendered" sandbox="allow-scripts allow-modals allow-popups allow-forms allow-pointer-lock"></iframe>
  <pre id="raw" class="hidden"></pre>
  <pre id="stderr" class="err-box hidden"></pre>
  <footer>Generated by the Nim→Wasm browser compiler. WASI preview1 / <code>wasi_unstable</code> ABI.</footer>

<script>
// ---- inlined wasm ----
const WASM_B64 = "__WASM_B64__";

// ---- minimal WASI host (preview1 / "unstable") ----
function makeWasiRunner() {
  const ENC = new TextEncoder();
  let memory = null;
  const u8 = () => new Uint8Array(memory.buffer);
  const dv = () => new DataView(memory.buffer);
  const out = { stdout: [], stderr: [] };
  const ERRNO_BADF = 8, ERRNO_SUCCESS = 0;
  class ProcExit extends Error { constructor(code){ super('exit '+code); this.code = code; } }

  function writeIovs(fd, iovsPtr, iovsLen, nwrittenPtr) {
    const view = dv(); let total = 0;
    for (let i = 0; i < iovsLen; i++) {
      const p = iovsPtr + i * 8;
      const buf = view.getUint32(p, true), len = view.getUint32(p + 4, true);
      if (len > 0) { out[fd === 2 ? 'stderr' : 'stdout'].push(u8().slice(buf, buf + len)); total += len; }
    }
    view.setUint32(nwrittenPtr, total, true);
    return ERRNO_SUCCESS;
  }

  const impl = {
    proc_exit(code) { throw new ProcExit(code); },
    fd_write(fd, p, n, w) { return writeIovs(fd, p, n, w); },
    fd_read(_fd, _i, _n, nreadPtr) { dv().setUint32(nreadPtr, 0, true); return ERRNO_SUCCESS; },
    fd_close() { return ERRNO_SUCCESS; },
    fd_seek(_fd, _lo, _hi, _w, newOffPtr) {
      if (typeof newOffPtr === 'number') { dv().setUint32(newOffPtr, 0, true); dv().setUint32(newOffPtr + 4, 0, true); }
      return ERRNO_SUCCESS;
    },
    fd_fdstat_get(_fd, buf) {
      const v = dv();
      v.setUint8(buf, 2); v.setUint16(buf + 2, 0, true);
      v.setBigUint64(buf + 8, 0xffffffffffffffffn, true);
      v.setBigUint64(buf + 16, 0xffffffffffffffffn, true);
      return ERRNO_SUCCESS;
    },
    fd_prestat_get() { return ERRNO_BADF; },
    fd_prestat_dir_name() { return ERRNO_BADF; },
    args_sizes_get(a, b) { const v = dv(); v.setUint32(a, 1, true); v.setUint32(b, ENC.encode('app.wasm').length + 1, true); return ERRNO_SUCCESS; },
    args_get(argvPtr, bufPtr) { dv().setUint32(argvPtr, bufPtr, true); u8().set(ENC.encode('app.wasm\0'), bufPtr); return ERRNO_SUCCESS; },
    environ_sizes_get(a, b) { const v = dv(); v.setUint32(a, 0, true); v.setUint32(b, 0, true); return ERRNO_SUCCESS; },
    environ_get() { return ERRNO_SUCCESS; },
    clock_time_get(_id, _p, t) { dv().setBigUint64(t, BigInt(Date.now()) * 1000000n, true); return ERRNO_SUCCESS; },
    clock_res_get(_id, r) { dv().setBigUint64(r, 1000000n, true); return ERRNO_SUCCESS; },
    random_get(buf, len) {
      const b = u8().subarray(buf, buf + len);
      if (globalThis.crypto && crypto.getRandomValues)
        for (let o = 0; o < len; o += 65536) crypto.getRandomValues(b.subarray(o, Math.min(o + 65536, len)));
      else for (let i = 0; i < len; i++) b[i] = (Math.random() * 256) | 0;
      return ERRNO_SUCCESS;
    },
    poll_oneoff(_i, _o, _n, neventsPtr) { dv().setUint32(neventsPtr, 0, true); return ERRNO_SUCCESS; },
    sched_yield() { return ERRNO_SUCCESS; },
  };

  function buildImports(module) {
    const imports = {};
    for (const { module: mod, name, kind } of WebAssembly.Module.imports(module)) {
      imports[mod] = imports[mod] || {};
      if (kind === 'function') imports[mod][name] = impl[name] || (() => 0);
    }
    return imports;
  }

  async function run(bytes) {
    out.stdout.length = 0; out.stderr.length = 0;
    const module = await WebAssembly.compile(bytes);
    const instance = await WebAssembly.instantiate(module, buildImports(module));
    memory = instance.exports.memory;
    let code = 0;
    try { instance.exports._start(); }
    catch (e) { if (e instanceof ProcExit) code = e.code; else throw e; }
    const join = (chunks) => {
      const total = chunks.reduce((n, c) => n + c.length, 0);
      const all = new Uint8Array(total); let o = 0;
      for (const c of chunks) { all.set(c, o); o += c.length; }
      return new TextDecoder().decode(all);
    };
    return { code, stdout: join(out.stdout), stderr: join(out.stderr) };
  }
  return { run };
}

// ---- driver ----
const $ = (id) => document.getElementById(id);
const bytes = Uint8Array.from(atob(WASM_B64), (c) => c.charCodeAt(0));

function showTab(which) {
  const rendered = which === 'rendered';
  $('rendered').classList.toggle('hidden', !rendered);
  $('raw').classList.toggle('hidden', rendered);
  $('tabRendered').classList.toggle('active', rendered);
  $('tabRaw').classList.toggle('active', !rendered);
}
$('tabRendered').onclick = () => showTab('rendered');
$('tabRaw').onclick = () => showTab('raw');

async function go() {
  $('status').textContent = 'running…';
  $('status').className = 'pill';
  try {
    const r = await makeWasiRunner().run(bytes);
    $('rendered').srcdoc = r.stdout || '<em style="color:#888">(no output)</em>';
    $('raw').textContent = r.stdout;
    const se = $('stderr');
    if (r.stderr.trim()) { se.textContent = r.stderr; se.classList.remove('hidden'); }
    else se.classList.add('hidden');
    $('status').textContent = 'exit ' + r.code;
    $('status').className = 'pill ' + (r.code === 0 ? 'ok' : 'err');
  } catch (e) {
    $('status').textContent = 'crash';
    $('status').className = 'pill err';
    const se = $('stderr');
    se.textContent = String((e && e.stack) || e);
    se.classList.remove('hidden');
  }
}
$('rerun').onclick = go;
go();
</script>
</body>
</html>
